version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/homedrive"
    schedule:
      interval: "weekly"
    groups:
      rclone:
        patterns:
          - "github.com/rclone/rclone*"
        update-types:
          - "minor"
          - "patch"
      mqtt:
        patterns:
          - "github.com/eclipse/paho.mqtt.golang"
          - "github.com/mochi-mqtt/*"
      go-stdlib-adjacent:
        patterns:
          - "golang.org/x/*"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
